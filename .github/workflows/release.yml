name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features

  build:
    needs: quality
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Cross build (release)
        uses: zijiren233/cargo-cross@v1
        with:
          command: build
          profile: release
          targets: ${{ matrix.target }}
      - name: Prepare binary archive
        shell: bash
        run: |
          set -e
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/iptv-rs" "dist/iptv-rs"
          cp LICENSE NOTICE THIRD_PARTY_NOTICES.md dist/
          (
            cd dist
            zip "../iptv-rs-${{ matrix.target }}.zip" \
              "iptv-rs" "LICENSE" "NOTICE" "THIRD_PARTY_NOTICES.md"
          )
      - name: Upload zipped binary
        uses: actions/upload-artifact@v7
        with:
          name: iptv-rs-${{ matrix.target }}
          path: |
            iptv-rs-${{ matrix.target }}.zip
          retention-days: 7
        

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --output RELEASE_NOTES.md
      - name: Download all zipped binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.zip
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
